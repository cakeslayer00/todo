databaseChangeLog:
  - changeSet:
      id: 003-create-email-verifications-table
      author: cake
      changes:
        - createSequence:
            sequenceName: email_verifications_id_seq
            startValue: 1
            incrementBy: 1
        - createTable:
            tableName: email_verifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueComputed: nextval('email_verifications_id_seq')
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_email_verifications_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: consumed_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_email_verifications_user
            tableName: email_verifications
            columns:
              - column:
                  name: user_id